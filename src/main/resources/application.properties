spring.application.name=ChatAppBackend
spring.config.import=optional:file:.env

# database
spring.datasource.url=jdbc:mysql://localhost:3306/ChatApp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#jwt
jwt.secret-key=MySecretKey123456789MySecretKey123456789
jwt.access-token-time=100
jwt.refresh-token-time=600

#admin account
admin.username=admin
admin.password=admin

# Email Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
